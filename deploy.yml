# =============================================================================
# LegalOps — Deploy pipeline
#
# Triggered on push to main.
# Jobs:
#   1. test     — run backend test suite (reuses existing CI config)
#   2. deploy-backend  — build Docker image, push to Railway
#   3. deploy-frontend — build Next.js, push to Vercel
#
# Required GitHub secrets:
#   RAILWAY_TOKEN           — from railway.app → Account Settings → Tokens
#   RAILWAY_SERVICE_API     — Railway service ID for the "api" service
#   RAILWAY_SERVICE_WORKER  — Railway service ID for the "worker" service
#   RAILWAY_SERVICE_BEAT    — Railway service ID for the "beat" service
#   VERCEL_TOKEN            — from vercel.com → Settings → Tokens
#   VERCEL_ORG_ID           — from vercel.com → Settings → General
#   VERCEL_PROJECT_ID       — from .vercel/project.json after first `vercel link`
#   CI_ENCRYPTION_KEY       — Fernet key used in tests (same as ENCRYPTION_KEY)
# =============================================================================

name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

# ── 1. Backend tests ──────────────────────────────────────────────────────────
jobs:
  test:
    name: Backend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: legalops_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s --health-timeout 5s --health-retries 5

      redis:
        image: redis:7
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s --health-timeout 5s --health-retries 5

    env:
      DATABASE_URL:      postgresql+asyncpg://postgres:postgres@localhost:5432/legalops_test
      DATABASE_URL_SYNC: postgresql://postgres:postgres@localhost:5432/legalops_test
      REDIS_URL:         redis://localhost:6379/0
      JWT_SECRET:        ci-test-secret-not-for-production
      ENCRYPTION_KEY:    ${{ secrets.CI_ENCRYPTION_KEY }}
      APP_ENV:           test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache Poetry
        uses: actions/cache@v4
        with:
          path: ~/.cache/pypoetry
          key: ${{ runner.os }}-poetry-${{ hashFiles('backend/poetry.lock') }}

      - run: pip install poetry
      - run: poetry install
      - run: poetry run alembic upgrade head
      - run: poetry run pytest -v --tb=short

# ── 2. Deploy backend to Railway ─────────────────────────────────────────────
  deploy-backend:
    name: Deploy backend (Railway)
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy API service
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway up \
            --service ${{ secrets.RAILWAY_SERVICE_API }} \
            --detach \
            --no-git-ignore \
            --context backend

      - name: Deploy Worker service
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway up \
            --service ${{ secrets.RAILWAY_SERVICE_WORKER }} \
            --detach \
            --no-git-ignore \
            --context backend

      - name: Deploy Beat service
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway up \
            --service ${{ secrets.RAILWAY_SERVICE_BEAT }} \
            --detach \
            --no-git-ignore \
            --context backend

      - name: Wait for API health check
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          echo "Waiting 30s for Railway to start new replica..."
          sleep 30
          # Poll the health endpoint (Railway provides a public URL per service)
          for i in {1..10}; do
            STATUS=$(railway status --service ${{ secrets.RAILWAY_SERVICE_API }} --json 2>/dev/null | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('status',''))" 2>/dev/null || echo "unknown")
            echo "Deployment status: $STATUS"
            if [ "$STATUS" = "SUCCESS" ] || [ "$STATUS" = "ACTIVE" ]; then
              echo "API deployed successfully"
              exit 0
            fi
            sleep 15
          done
          echo "Deployment did not reach SUCCESS within timeout — check Railway dashboard"
          exit 1

# ── 3. Deploy frontend to Vercel ─────────────────────────────────────────────
  deploy-frontend:
    name: Deploy frontend (Vercel)
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel env
        working-directory: frontend
        env:
          VERCEL_TOKEN:      ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID:     ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: vercel pull --yes --environment=production --token=$VERCEL_TOKEN

      - name: Build
        working-directory: frontend
        env:
          VERCEL_TOKEN:      ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID:     ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: vercel build --prod --token=$VERCEL_TOKEN

      - name: Deploy to Vercel
        working-directory: frontend
        env:
          VERCEL_TOKEN:      ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID:     ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          DEPLOY_URL=$(vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN)
          echo "Deployed to: $DEPLOY_URL"
          echo "DEPLOY_URL=$DEPLOY_URL" >> $GITHUB_ENV

      - name: Comment deploy URL on commit
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            const url = process.env.DEPLOY_URL;
            if (!url) return;
            await github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body: `🚀 Frontend deployed to ${url}`
            });
