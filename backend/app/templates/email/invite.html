<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>You're invited to LegalOps</title>
</head>
<body style="margin:0;padding:0;background:#f5f0eb;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" border="0">
    <tr>
      <td align="center" style="padding:40px 16px;">
        <table width="560" cellpadding="0" cellspacing="0" border="0"
               style="background:#ffffff;border-radius:8px;overflow:hidden;
                      box-shadow:0 2px 8px rgba(0,0,0,0.08);">

          <!-- Header -->
          <tr>
            <td style="background:#3b1f0e;padding:32px 40px;">
              <span style="color:#e8d5c4;font-size:22px;font-weight:700;letter-spacing:-0.5px;">
                LegalOps
              </span>
            </td>
          </tr>

          <!-- Body -->
          <tr>
            <td style="padding:40px 40px 32px;">
              <h1 style="margin:0 0 8px;font-size:22px;color:#1a0f06;font-weight:700;">
                You've been invited
              </h1>
              <p style="margin:0 0 24px;font-size:15px;color:#5c4a3a;line-height:1.6;">
                Hi {name},<br><br>
                <strong>{invited_by}</strong> has invited you to join their organisation
                on <strong>LegalOps</strong> as a <strong>{role}</strong>.
              </p>

              <!-- CTA button -->
              <table cellpadding="0" cellspacing="0" border="0">
                <tr>
                  <td style="background:#7c3a1e;border-radius:6px;">
                    <a href="{invite_url}"
                       style="display:inline-block;padding:14px 32px;color:#ffffff;
                              font-size:15px;font-weight:600;text-decoration:none;
                              letter-spacing:0.2px;">
                      Accept Invitation
                    </a>
                  </td>
                </tr>
              </table>

              <p style="margin:24px 0 0;font-size:13px;color:#8c7a6e;line-height:1.6;">
                This link expires in <strong>7 days</strong>. If you weren't expecting this,
                you can safely ignore this email.
              </p>
            </td>
          </tr>

          <!-- Divider -->
          <tr>
            <td style="padding:0 40px;">
              <hr style="border:none;border-top:1px solid #ede8e3;margin:0;" />
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td style="padding:24px 40px;font-size:12px;color:#a89080;line-height:1.6;">
              Or copy and paste this link into your browser:<br>
              <a href="{invite_url}" style="color:#7c3a1e;word-break:break-all;">{invite_url}</a>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
